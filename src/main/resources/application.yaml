spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

---
spring.config.activate.on-profile: dev

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/twitterdb
    username: dev
    password: dev123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    org.hibernate.orm.jdbc.bind: trace

---
spring.config.activate.on-profile: prod

spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false